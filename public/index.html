<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Story Viewer</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 1rem; line-height: 1.6; }
        .story-container { max-width: 600px; margin: 0 auto; position: relative; }
        .story-image { width: 100%; height: auto; border-radius: 8px; }
        .title-wrapper { position: relative; padding-right: 2rem; }
        .title { font-size: 2em; margin: 0 0 0.5em; }
        .nav-buttons { position: absolute; top: 0; right: 0; display: flex; flex-direction: column; }
        .nav-buttons button { background: none; border: none; cursor: pointer; font-size: 1.5rem; line-height: 1; }
        .nav-buttons button:disabled { color: #ccc; cursor: default; }
        .date { color: #666; margin-bottom: 1em; }
        .star-rating { margin: 1em 0; }
        .star-rating button { background: none; border: none; cursor: pointer; padding: 0; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState, useEffect } = React;

        async function authFetch(url, options) {
            try {
                const res = await fetch(url, options);
                if (res.redirected && new URL(res.url).pathname === '/login') {
                    window.location.href = '/login';
                    throw new Error('Redirecting to login');
                }
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/login';
                    throw new Error('Unauthorized');
                }
                return res;
            } catch (err) {
                window.location.href = '/login';
                throw err;
            }
        }

        function App() {
            const [story, setStory] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [nextStory, setNextStory] = useState(null);
            const [prevStory, setPrevStory] = useState(null);
            const [imageLoaded, setImageLoaded] = useState(false);
            const updateNeighbors = id => {
                Promise.all([
                    authFetch("/stories/" + id + "/prev").then(res => res.ok ? res.json() : null).catch(() => null),
                    authFetch("/stories/" + id + "/next").then(res => res.ok ? res.json() : null).catch(() => null)
                ]).then(([prev, next]) => { setPrevStory(prev); setNextStory(next); });
            };

            const load = id => {
                const url = id ? '/stories/' + id : '/stories';
                return authFetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error('Failed to load');
                        return res.json();
                    });
            };

            const setAndPush = data => {
                setStory(data);
                setImageLoaded(false);
                history.replaceState(null, '', '?id=' + data.id);
                updateNeighbors(data.id);
            };

            const loadNext = () => {
                if (!nextStory) return;
                setAndPush(nextStory);
            };

            const loadPrev = () => {
                if (!prevStory) return;
                setAndPush(prevStory);
            };

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                load(id)
                    .then(data => { setAndPush(data); setLoading(false); })
                    .catch(err => {
                        console.error(err);
                        setError(err);
                        setLoading(false);
                    });
            }, []);


            if (loading) return React.createElement('p', null, 'Loading...');
            if (error || !story) return React.createElement('p', null, 'Story not found.');

            return React.createElement('div', { className: 'story-container' }, [
                React.createElement('div', { className: 'title-wrapper', key: 'title-wrap' }, [
                    React.createElement('h1', { className: 'title', key: 'title' }, story.title),
                    React.createElement('div', { className: 'nav-buttons', key: 'nav' }, [
                        React.createElement('button', { key: 'up', onClick: loadPrev, disabled: !prevStory }, '▲'),
                        React.createElement('button', { key: 'down', onClick: loadNext, disabled: !nextStory }, '▼')
                    ])
                ]),
                story.image_url ? React.createElement('img', { className: 'story-image', src: "/images/" + story.image_url, alt: story.title, key: 'image', onLoad: () => setImageLoaded(true), style: { display: imageLoaded ? 'block' : 'none' } }) : null,
                React.createElement('div', { className: 'star-rating', key: 'rating' }, [
                    React.createElement('span', { key: 'label' }, 'Rating: '),
                    story.average_rating ?
                        React.createElement('span', { key: 'stars', style: { color: '#f5c518', fontSize: '1.2em' } }, '★'.repeat(Math.round(story.average_rating)) + '☆'.repeat(5 - Math.round(story.average_rating)),
                            ` (${story.average_rating.toFixed(1)})`)
                        : React.createElement('span', { key: 'no-rating', style: { color: '#aaa' } }, 'Not rated yet'),
                    React.createElement('div', { key: 'rate', style: { marginTop: '0.5em' } },
                        [1,2,3,4,5].map(n =>
                            React.createElement('button', {
                                key: n,
                                style: { color: '#f5c518', fontSize: '1.5em', background: 'none', border: 'none', cursor: 'pointer', padding: 0 },
                                onClick: async () => {
                                    const res = await fetch(`/stories/${story.id}/rate`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ rating: n })
                                    });
                                    if (res.ok) {
                                        const data = await res.json();
                                        setStory({ ...story, average_rating: data.average_rating });
                                    } else {
                                        alert('Failed to submit rating');
                                    }
                                }
                            }, '★')
                        )
                    )
                ]),
                React.createElement('div', {
                    className: 'content',
                    key: 'content',
                    dangerouslySetInnerHTML: { __html: story.content }
                })
            ]);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
